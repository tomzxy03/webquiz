spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      url: ${REDIS_URL}

logging:
  level:
    root: WARN
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET}

groq:
  api-key: ${GROQ_KEY}

server:
  tomcat:
    max-threads: 300   # tăng từ default 200
    min-spare-threads: 50