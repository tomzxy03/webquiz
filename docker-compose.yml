
services:

  postgres:
    image: postgres:16
    container_name: quiz-postgres
    restart: always
    environment:
      POSTGRES_DB: quizory
      POSTGRES_USER: tomzxy
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: quiz-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  quiz-api:
    build: .
    container_name: quiz-api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quizory
      SPRING_DATASOURCE_USERNAME: tomzxy
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      JWT_SECRET: ${JWT_SECRET}

    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
  redis_data: